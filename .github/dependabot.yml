version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "19:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      runtime-pyyaml:
        patterns:
          - "pyyaml"
      build-setuptools:
        patterns:
          - "setuptools"
      dev-pytest:
        patterns:
          - "pytest*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "19:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
