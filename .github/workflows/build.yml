name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
permissions:
  contents: read
env:
  # Opt all JavaScript-based actions into Node.js 24 ahead of the GitHub-hosted runner default change.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  validate-workflows:
    name: Validate workflow action runtimes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Ensure deprecated Node.js 20 Dependabot action is not used
        run: |
          if git grep -nE "^[[:space:]]*-[[:space:]]*uses:[[:space:]]*github/dependabot-action@" -- .github/workflows '*.yml' '*.yaml'; then
            echo "Deprecated github/dependabot-action reference found."
            exit 1
          fi
      - name: Ensure Node.js 24 override is enabled
        run: |
          if ! git grep -nE "^[[:space:]]*FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:[[:space:]]*true[[:space:]]*$" -- .github/workflows '*.yml' '*.yaml'; then
            echo "Missing FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true in workflow files."
            exit 1
          fi

  test:
    name: Test (${{ matrix.python_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_label: baseline
            use_version_file: true
          - python_label: latest
            python_version: "3.x"
            use_version_file: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify .python-version exists
        if: matrix.use_version_file
        run: test -f .python-version
      - name: Setup Python from .python-version
        if: matrix.use_version_file
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Setup latest stable Python
        if: ${{ !matrix.use_version_file }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}
      - name: Show resolved Python version
        run: python --version
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run Ruff
        run: ruff check .
      - name: Run tests
        run: pytest

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
